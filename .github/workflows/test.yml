---
name: Tests
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: "${{ matrix.experimental || false }}"
    strategy:
      fail-fast: false
      matrix:
        ruby:
        - "2.7"
        - "3.0"
        - "3.2"
        - "3.4"
        include:
        - ruby: "head"
          experimental: true
    steps:
    - uses: actions/checkout@v4
    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "${{ matrix.ruby }}"
        bundler-cache: true
    - name: Run tests
      run: bundle exec rake spec
